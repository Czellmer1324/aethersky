services:
  db:
    image: postgres
    container_name: aetherskyDB
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: randompassword1!
      POSTGRES_DB: aethersky

  adminer:
    image: adminer:latest
    container_name: adminer_gui
    restart: always
    ports:
      - "5433:8080"
    depends_on:
      - db